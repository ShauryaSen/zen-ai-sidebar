<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen AI</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="sidebar-container">
    <!-- Header (compact, right-aligned icons) -->
    <div class="header">
      <button class="icon-btn" id="clearBtn" title="New Chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m8.66-13l-5.2 3m-7 4l-5.2 3M22.66 17l-5.2-3m-7-4l-5.2-3"/>
        </svg>
      </button>
    </div>

    <!-- Selection banner -->
    <div class="selection-banner hidden" id="selectionBanner">
      <div class="selection-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M17 10H3M21 6H3M21 14H3M17 18H3"/>
        </svg>
      </div>
      <span class="selection-text" id="selectionText"></span>
      <button class="selection-dismiss" id="selectionDismiss">&times;</button>
    </div>

    <!-- Messages area -->
    <div class="messages" id="messagesArea">
      <div class="welcome-message">
        <div class="welcome-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h2>Zen AI</h2>
        <p>Ask questions about the current page, summarize content, or get explanations for highlighted text.</p>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions" id="quickActions">
      <button class="action-btn" data-action="summarize">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Summarize
      </button>
      <button class="action-btn" data-action="explain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Explain
      </button>
      <button class="action-btn" data-action="keypoints">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Key Points
      </button>
      <button class="action-btn" data-action="paper-summary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Research Paper
      </button>
      <button class="action-btn hidden" data-action="transcript" id="transcriptBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Transcript
      </button>
    </div>

    <!-- Context indicator (above input) -->
    <div class="context-bar" id="contextBar">
      <div class="context-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <span class="context-text" id="contextText">No page loaded</span>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="chatInput"
          placeholder="Ask another question..."
          rows="1"
          autocomplete="off"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="icon-btn modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="apiKeyInput">Gemini API Key</label>
          <p class="setting-hint">Get your key from <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></p>
          <div class="api-key-input-wrapper">
            <input type="password" id="apiKeyInput" placeholder="Enter your API key..." autocomplete="off" />
            <button class="icon-btn toggle-visibility" id="toggleKeyVisibility" title="Show/hide key">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash (Default)</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite (Fastest)</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Powerful)</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <optgroup label="Basic">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="zen-auto">Zen Browser</option>
            </optgroup>
            <optgroup label="Catppuccin">
              <option value="catppuccin-latte">Latte</option>
              <option value="catppuccin-frappe">Frapp&eacute;</option>
              <option value="catppuccin-macchiato">Macchiato</option>
              <option value="catppuccin-mocha">Mocha</option>
            </optgroup>
            <optgroup label="Custom" id="customThemeGroup"></optgroup>
          </select>
          <div class="theme-import-row">
            <button class="import-theme-btn" id="importThemeBtn">Import Theme</button>
            <input type="file" id="themeFileInput" accept=".json" class="hidden" />
          </div>
        </div>
        <div class="setting-group">
          <label>Layout</label>
          <div class="theme-toggle-group">
            <button class="layout-option" data-layout-value="default">Default</button>
            <button class="layout-option" data-layout-value="mirrored">Mirrored</button>
          </div>
        </div>
        <div class="setting-group">
          <label for="shortcutInput">Toggle Shortcut</label>
          <p class="setting-hint">Current keyboard shortcut for the sidebar</p>
          <div class="shortcut-input-wrapper">
            <input type="text" id="shortcutInput" readonly placeholder="Loading..." />
            <button class="icon-btn" id="editShortcutBtn" title="Edit shortcut">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </button>
          </div>
          <p class="setting-hint shortcut-hint hidden" id="shortcutHint">Press new shortcut combination, then Enter to confirm. Esc to cancel.</p>
        </div>
        <button class="save-btn" id="saveSettings">Save Settings</button>
        <div class="save-status hidden" id="saveStatus"></div>
      </div>
    </div>
  </div>

  <script src="theme-manager.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
